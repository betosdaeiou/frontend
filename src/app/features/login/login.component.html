<div class="min-h-screen bg-gray-950 flex items-center justify-center p-4 relative overflow-hidden">
  <!-- Glowing background elements para el diseño Premium -->
  <div class="absolute w-[500px] h-[500px] bg-blue-500 rounded-full mix-blend-screen filter blur-[100px] opacity-20 top-[-100px] left-[-100px] animate-pulse"></div>
  <div class="absolute w-[500px] h-[500px] bg-purple-600 rounded-full mix-blend-screen filter blur-[100px] opacity-20 bottom-[-100px] right-[-100px] animate-pulse" style="animation-delay: 2s;"></div>

  <div class="max-w-md w-full backdrop-blur-xl bg-white/5 border border-white/10 p-10 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)] relative z-10 transition-all">
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 mb-4 shadow-[0_0_20px_rgba(59,130,246,0.6)]">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="white" class="w-8 h-8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
        </svg>
      </div>
      <h2 class="text-3xl font-bold text-white tracking-tight">Acceso Seguro</h2>
      <p class="text-gray-400 mt-2 text-sm font-medium">Plataforma exclusiva para personal autorizado</p>
    </div>

    <!-- Mensaje de Error -->
    <div *ngIf="error" class="bg-red-500/10 border border-red-500/30 text-red-400 p-4 rounded-xl text-sm mb-6 flex items-start gap-3 backdrop-blur-sm animate-fade-in">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0 mt-0.5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
      </svg>
      <span class="leading-tight">{{ error }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <!-- Campo de Correo -->
      <div>
        <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2">Correo Electrónico</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500 group-focus-within:text-blue-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
          </div>
          <input 
            type="email" 
            formControlName="correo"
            class="w-full bg-black/40 border border-white/10 text-white rounded-xl pl-11 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all placeholder-gray-600 block" 
            placeholder="usuario@dominio.com">
        </div>
      </div>

      <!-- Campo de Contraseña -->
      <div>
        <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2">Contraseña</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500 group-focus-within:text-blue-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <input 
            type="password" 
            formControlName="password"
            class="w-full bg-black/40 border border-white/10 text-white rounded-xl pl-11 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all placeholder-gray-600 block" 
            placeholder="••••••••">
        </div>
      </div>

      <!-- Forgot Password -->
      <div class="text-right">
        <a routerLink="/recuperar-password" class="text-xs text-gray-400 hover:text-blue-400 transition-colors font-medium">¿Olvidaste tu contraseña?</a>
      </div>

      <!-- Botón de Login -->
      <button 
        type="submit" 
        [disabled]="loginForm.invalid || isLoading"
        class="w-full mt-8 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_10px_20px_-10px_rgba(59,130,246,0.6)] transition-all transform hover:-translate-y-0.5 active:translate-y-0 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 focus:ring-offset-gray-950 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none flex justify-center items-center gap-3">
        <ng-container *ngIf="!isLoading">
          Entrar al Sistema
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
          </svg>
        </ng-container>
        <ng-container *ngIf="isLoading">
          <span class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
          Verificando Identidad...
        </ng-container>
      </button>

      <!-- Enlace a Registro Institucional -->
      <p class="text-center text-sm text-gray-500 mt-6 font-medium">
        ¿Tu empresa automotriz no tiene cuenta? <br/>
        <a routerLink="/registro-taller" class="text-blue-400 font-bold hover:text-blue-300 hover:underline transition-colors mt-1 inline-block">Registra tu Taller aquí</a>
      </p>
    </form>
  </div>
</div>
